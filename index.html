<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>パスキー診断</title>
<style>
:root{
  --ink:#16202e; --sub:#5b6b7f; --line:#dde4ec; --bg:#f6f8fa; --card:#ffffff;
  --ok:#0e8a5f; --ok-bg:#e4f5ee;
  --ng:#c02942; --ng-bg:#fbe9ec;
  --warn:#b06a00; --warn-bg:#fdf3e0;
  --info:#2a5db0; --info-bg:#e8f0fb;
  --mono:"SF Mono",ui-monospace,Menlo,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"Hiragino Sans",Roboto,"Noto Sans JP",sans-serif;background:var(--bg);color:var(--ink);
  padding:14px 12px calc(20px + env(safe-area-inset-bottom));max-width:560px;margin:0 auto;
  font-size:14px;line-height:1.55}
h1{font-size:17px;font-weight:700;letter-spacing:.02em}
.sub{color:var(--sub);font-size:12px;margin:2px 0 10px}
.oschip{display:inline-block;font-size:11px;font-weight:700;border-radius:20px;padding:3px 10px;
  margin-bottom:12px;background:var(--info-bg);color:var(--info);border:1px solid #cddcf3}
.verdict{border-radius:12px;padding:12px 14px;margin-bottom:12px;font-weight:700;font-size:15px;
  display:none;border:1px solid transparent}
.verdict.ok{display:block;background:var(--ok-bg);color:var(--ok);border-color:#bfe6d6}
.verdict.ng{display:block;background:var(--ng-bg);color:var(--ng);border-color:#f2c4cd}
.verdict.warn{display:block;background:var(--warn-bg);color:var(--warn);border-color:#f0dcb0}
.verdict small{display:block;font-weight:400;font-size:12px;margin-top:3px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:12px}
.card h2{font-size:12px;font-weight:600;color:var(--sub);padding:10px 12px 0;letter-spacing:.04em}
.row{display:flex;align-items:flex-start;gap:9px;padding:9px 12px;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}
.badge{flex:0 0 auto;min-width:34px;text-align:center;font-size:11px;font-weight:700;
  border-radius:6px;padding:2px 6px;margin-top:1px}
.b-ok{background:var(--ok-bg);color:var(--ok)}
.b-ng{background:var(--ng-bg);color:var(--ng)}
.b-warn{background:var(--warn-bg);color:var(--warn)}
.b-wait{background:#eef1f5;color:var(--sub)}
.row .t{flex:1}
.row .name{font-weight:600;font-size:13px}
.row .desc{color:var(--sub);font-size:12px;margin-top:1px}
button{width:100%;padding:13px;border:none;border-radius:12px;background:var(--ink);color:#fff;
  font-size:15px;font-weight:700;font-family:inherit}
button:disabled{opacity:.45}
button.sec{background:#eef1f5;color:var(--ink);margin-top:8px;font-weight:600;font-size:13px;padding:10px}
.note{font-size:11px;color:var(--sub);margin:8px 2px 0}
.fix{background:var(--info-bg);border:1px solid #cddcf3;border-radius:12px;padding:11px 13px;
  margin-bottom:12px;display:none}
.fix h3{font-size:13px;color:var(--info);margin-bottom:5px}
.fix ol{padding-left:18px;font-size:13px}
.fix li{margin-bottom:5px}
.fix li:last-child{margin-bottom:0}
/* NG詳細パネル */
#ngDetail{display:none;margin-bottom:12px}
.ngItem{background:var(--card);border:1px solid #f2c4cd;border-left:4px solid var(--ng);
  border-radius:12px;padding:11px 13px;margin-bottom:10px}
.ngItem.warnItem{border-color:#f0dcb0;border-left-color:var(--warn)}
.ngItem h3{font-size:13px;color:var(--ng);margin-bottom:4px}
.ngItem.warnItem h3{color:var(--warn)}
.ngItem .raw{font-family:var(--mono);font-size:10.5px;background:#f4f6f9;border-radius:6px;
  padding:6px 8px;margin:5px 0 7px;color:#41506a;word-break:break-all;white-space:pre-wrap}
.ngItem .cause{font-size:12.5px;margin-bottom:6px}
.ngItem ol{padding-left:18px;font-size:12.5px}
.ngItem li{margin-bottom:4px}
.ngItem li:last-child{margin-bottom:0}
#log{font-family:var(--mono);font-size:10.5px;color:var(--sub);white-space:pre-wrap;
  padding:10px 12px;display:none;word-break:break-all}
</style>
</head>
<body>

<h1>🔑 パスキー作成 診断ツール</h1>
<p class="sub">iPhone / Androidでパスキーが作れない原因を自動チェック</p>
<span class="oschip" id="oschip">判定中…</span>

<div id="verdict" class="verdict"></div>

<div id="fix" class="fix">
  <h3 id="fixTitle"></h3>
  <ol id="fixList"></ol>
</div>

<div class="card">
  <h2>環境チェック(自動)</h2>
  <div id="checks"></div>
</div>

<div id="ngDetail"></div>

<button id="runBtn">パスキー作成テストを実行</button>
<p class="note" id="bioNote"></p>
<button class="sec" id="logBtn">詳細ログを表示</button>

<div class="card" style="margin-top:12px"><div id="log"></div></div>

<script>
const checksEl = document.getElementById('checks');
const logEl = document.getElementById('log');
const logs = [];
function log(m){ logs.push(new Date().toISOString().slice(11,19)+' '+m); logEl.textContent = logs.join('\n'); }
document.getElementById('logBtn').onclick = () => {
  logEl.style.display = logEl.style.display === 'block' ? 'none' : 'block';
};

// ---- OS判定 ----
function detectOS(){
  const ua = navigator.userAgent;
  if(/Android/i.test(ua)){
    const m = ua.match(/Android (\d+)(?:\.(\d+))?/i);
    return { os:'android', ver: m ? parseInt(m[1],10) : null,
             label: m ? ('Android ' + m[1]) : 'Android' };
  }
  // iPadOS 13+はUAが"Macintosh"になるためタッチ点数で判別
  if(/iPhone|iPad|iPod/.test(ua) || (/Macintosh/.test(ua) && navigator.maxTouchPoints > 1)){
    const m = ua.match(/OS (\d+)[._](\d+)/);
    return { os:'ios', ver: m ? parseInt(m[1],10) : null,
             label: m ? ('iOS ' + m[1] + '.' + m[2]) : 'iOS / iPadOS' };
  }
  return { os:'other', ver:null, label:'PC / その他' };
}
const OS = detectOS();

// ---- アプリ内ブラウザ(WebView)検出 ----
function detectWebView(){
  const ua = navigator.userAgent;
  const hints = [
    [/GSA\//,'Googleアプリ'], [/Line\//i,'LINE'], [/FBAN|FBAV|FB_IAB/,'Facebook/Messenger'],
    [/Instagram/i,'Instagram'], [/Twitter|TwitterAndroid/i,'X (Twitter)'],
    [/MicroMessenger/i,'WeChat'], [/YJApp/i,'Yahoo!アプリ'], [/; wv\)/,'Android WebView'],
  ];
  for(const [re,name] of hints){ if(re.test(ua)) return name; }
  // iOSでSafari/CriOS/FxiOS/EdgiOSいずれの表記もない場合はWebViewの可能性
  if(OS.os==='ios' && !/Safari|CriOS|FxiOS|EdgiOS/.test(ua)) return '不明なアプリ内ブラウザ';
  return null;
}
const WEBVIEW = detectWebView();
log('detectOS=' + OS.os + ' ver=' + OS.ver + ' webview=' + WEBVIEW);
document.getElementById('oschip').textContent =
  (OS.os==='ios' ? '📱 ' : OS.os==='android' ? '🤖 ' : '💻 ') + OS.label + ' を検出' +
  (WEBVIEW ? '(' + WEBVIEW + '内)' : '');

// OS別の文言
const T = {
  ios: {
    bio: 'Face ID / Touch ID',
    authDesc: '端末内の生体認証・パスコード認証器',
    minVer: 16,
    browser: 'Safari',
    testNote: '※ Face ID / Touch ID のダイアログが出ます。成功するとこのサイト用のテスト用パスキーが保存されますが、「設定 → パスワード」からいつでも削除できます。',
    cleanup: '設定 → パスワード → このサイトのドメインを検索して削除できます(残しても害はありません)',
    platSteps: [
      '設定 → 一般 → 自動入力とパスワード → 「パスワードとパスキーを自動入力」がON、かつ自動入力の使用元に「パスワード」(iCloud)がチェックされているか確認(1Password等のサードパーティのみだとNGになる場合があります)',
      '設定 → [自分の名前] → iCloud → パスワードとキーチェーン がONか確認',
      '設定 → Face IDとパスコード → パスコードが設定されているか確認',
      '設定 → プライバシーとセキュリティ → ロックダウンモード がOFFか確認',
      '設定 → スクリーンタイム → コンテンツとプライバシーの制限 → 「パスワードとパスキーの変更」が「許可」か確認',
      '設定変更後はSafariを完全に終了(タスクキル)してから再テスト',
    ],
    notAllowed: [
      '自分でキャンセルした場合は、もう一度テストして生体認証まで進めてください',
      '設定 → [自分の名前] → iCloud → パスワードとキーチェーン がONか確認',
      '設定 → 一般 → 自動入力とパスワード → 自動入力の使用元に「パスワード」(iCloud)がチェックされているか確認',
      '設定 → Face IDとパスコード → パスコードが設定されているか確認',
      '設定 → スクリーンタイム → コンテンツとプライバシーの制限 → 「パスワードとパスキーの変更」が「許可」になっているか確認',
      'プライベートブラウズを使っている場合は通常タブで試す',
    ],
  },
  android: {
    bio: '指紋 / 顔認証',
    authDesc: '端末内の生体認証・画面ロック認証器',
    minVer: 9,
    browser: 'Chrome',
    testNote: '※ 指紋 / 顔認証のダイアログが出ます。成功するとテスト用パスキーがGoogleパスワードマネージャーに保存されますが、いつでも削除できます。',
    cleanup: '設定 → Google → パスワードマネージャー(またはChromeの設定 → パスワード)からこのサイトのパスキーを削除できます(残しても害はありません)',
    platSteps: [
      '設定 → セキュリティ → 画面ロック(PIN/パターン/指紋)が設定されているか確認',
      'Googleアカウントに端末がログインしているか確認(設定 → Google)',
      'Google Play開発者サービス・Chromeを最新版にアップデート',
      '設定変更後はChromeを完全に終了してから再テスト',
    ],
    notAllowed: [
      '自分でキャンセルした場合は、もう一度テストして生体認証まで進めてください',
      '設定 → セキュリティ → 画面ロック(PIN/パターン/指紋)が設定されているか確認',
      'Googleアカウントに端末がログインしているか確認(設定 → Google)',
      'Google Play開発者サービス・Chromeを最新版にアップデート',
      'シークレットモードを使っている場合は通常タブで試す',
    ],
  },
  other: {
    bio: '生体認証 / PIN',
    authDesc: '端末内の認証器(Windows Hello / Touch ID等)',
    minVer: null,
    browser: 'ブラウザ',
    testNote: '※ OSの認証ダイアログが出ます。成功するとテスト用パスキーが保存されますが、いつでも削除できます。',
    cleanup: 'OSのパスワード管理設定からこのサイトのパスキーを削除できます(残しても害はありません)',
    platSteps: [
      'OSの生体認証やPIN(Windows Hello等)が設定されているか確認',
      'ブラウザを最新版にアップデート',
    ],
    notAllowed: [
      '自分でキャンセルした場合は、もう一度テストして認証まで進めてください',
      'OSの生体認証やPIN(Windows Hello等)が設定されているか確認',
      'シークレット/プライベートモードを使っている場合は通常タブで試す',
    ],
  },
};
const t = T[OS.os];
document.getElementById('bioNote').textContent = t.testNote;

const rows = {};
function addRow(id, name, desc){
  const div = document.createElement('div');
  div.className = 'row';
  div.innerHTML = '<span class="badge b-wait">…</span><div class="t"><div class="name"></div><div class="desc"></div></div>';
  div.querySelector('.name').textContent = name;
  div.querySelector('.desc').textContent = desc || '';
  checksEl.appendChild(div);
  rows[id] = div;
}
function setRow(id, status, desc){
  const div = rows[id];
  const b = div.querySelector('.badge');
  const map = {ok:['OK','b-ok'], ng:['NG','b-ng'], warn:['注意','b-warn']};
  b.textContent = map[status][0];
  b.className = 'badge ' + map[status][1];
  if(desc !== undefined) div.querySelector('.desc').textContent = desc;
}

// ---- NG詳細パネル ----
const ngItems = [];
function addNgDetail(level, title, raw, cause, steps){
  ngItems.push({level, title, raw, cause, steps});
}
function renderNgDetails(){
  const box = document.getElementById('ngDetail');
  box.innerHTML = '';
  if(ngItems.length === 0){ box.style.display = 'none'; return; }
  ngItems.forEach(item => {
    const d = document.createElement('div');
    d.className = 'ngItem' + (item.level === 'warn' ? ' warnItem' : '');
    const h = document.createElement('h3');
    h.textContent = (item.level === 'warn' ? '⚠️ ' : '❌ ') + item.title;
    d.appendChild(h);
    if(item.raw){
      const r = document.createElement('div');
      r.className = 'raw';
      r.textContent = item.raw;
      d.appendChild(r);
    }
    if(item.cause){
      const c = document.createElement('div');
      c.className = 'cause';
      c.textContent = item.cause;
      d.appendChild(c);
    }
    if(item.steps && item.steps.length){
      const ol = document.createElement('ol');
      item.steps.forEach(s => { const li = document.createElement('li'); li.textContent = s; ol.appendChild(li); });
      d.appendChild(ol);
    }
    box.appendChild(d);
  });
  box.style.display = 'block';
}

function showVerdict(cls, title, sub){
  const v = document.getElementById('verdict');
  v.className = 'verdict ' + cls;
  v.innerHTML = '';
  v.append(title);
  if(sub){ const s = document.createElement('small'); s.textContent = sub; v.append(s); }
}
function showFix(title, steps){
  const f = document.getElementById('fix');
  document.getElementById('fixTitle').textContent = title;
  const ol = document.getElementById('fixList');
  ol.innerHTML = '';
  steps.forEach(s => { const li = document.createElement('li'); li.textContent = s; ol.appendChild(li); });
  f.style.display = 'block';
}
function hideFix(){ document.getElementById('fix').style.display = 'none'; }

// ---- 自動チェック ----
addRow('https',  'セキュアコンテキスト (HTTPS)', '');
addRow('api',    'WebAuthn API 対応', '');
addRow('plat',   t.bio + ' 認証器', t.authDesc);
addRow('cond',   '自動入力(Conditional UI)対応', '');
addRow('frame',  'iframe 制限', '');
addRow('wv',     'アプリ内ブラウザ判定', '');
addRow('os',     'ブラウザ / OS', '');

let fatal = false;

async function autoChecks(){
  // HTTPS
  const secure = window.isSecureContext;
  log('isSecureContext=' + secure + ' protocol=' + location.protocol + ' host=' + location.hostname);
  if(secure){
    setRow('https','ok', location.protocol + '//' + location.hostname);
  } else {
    setRow('https','ng','非セキュアコンテキストです');
    fatal = true;
    addNgDetail('ng','セキュアコンテキスト (HTTPS)',
      'window.isSecureContext = false\nlocation.protocol = ' + location.protocol,
      'パスキー(WebAuthn)はHTTPSページでのみ動作します。file:// やhttp://で開くとAPI自体が使えません。',
      ['Netlify DropやGitHub PagesなどHTTPSの環境にこのファイルを置く', 'そのHTTPSのURLを' + t.browser + 'で直接開く']);
  }

  // API
  const hasAPI = !!window.PublicKeyCredential;
  log('PublicKeyCredential=' + hasAPI);
  if(hasAPI){
    setRow('api','ok','navigator.credentials / PublicKeyCredential 利用可');
  } else {
    setRow('api','ng','WebAuthn非対応ブラウザ');
    fatal = true;
    addNgDetail('ng','WebAuthn API 対応',
      'window.PublicKeyCredential = undefined',
      'このブラウザにはWebAuthn APIが実装されていません。OSやブラウザが古い可能性があります。',
      [OS.os==='android' ? 'Chromeを最新版にアップデートする' : 'iOSを16以上にアップデートし、SafariかChromeで開く']);
  }

  // Platform authenticator
  if(hasAPI && PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable){
    try{
      const avail = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
      log('platformAuthenticator=' + avail);
      if(avail){
        setRow('plat','ok','利用可能');
      } else {
        setRow('plat','ng','認証器が見つかりません(詳細は下部を参照)');
        fatal = true;
        const steps = WEBVIEW
          ? ['アプリ内ブラウザ(' + WEBVIEW + ')で開いています。共有メニューやメニューボタンから「' + t.browser + 'で開く」を選んで開き直してください(これが原因の可能性が最も高いです)'].concat(t.platSteps)
          : t.platSteps.slice();
        addNgDetail('ng', t.bio + ' 認証器',
          'isUserVerifyingPlatformAuthenticatorAvailable() = false' +
          (WEBVIEW ? '\n実行環境: ' + WEBVIEW + '(アプリ内ブラウザ)' : ''),
          WEBVIEW
            ? 'APIはエラーなくfalseを返しました。アプリ内ブラウザでは端末の認証器にアクセスできないため、これが原因と考えられます。'
            : 'APIはエラーなくfalseを返しました。ブラウザから端末の認証器(生体認証)が見えていない状態です。アプリでパスキーが使えるのにブラウザでNGになる場合、ブラウザと端末のパスワード管理(キーチェーン等)の連携設定が原因のことが多いです。',
          steps);
      }
    }catch(e){
      log('plat check error: '+e);
      setRow('plat','warn','判定できませんでした: '+e.name);
      addNgDetail('warn', t.bio + ' 認証器',
        'isUserVerifyingPlatformAuthenticatorAvailable() が例外を送出\n' + e.name + ': ' + e.message,
        '判定API自体がエラーになりました。特殊な実行環境の可能性があります。',
        [t.browser + 'で直接このURLを開いて再テストしてください']);
    }
  } else if(hasAPI){
    setRow('plat','warn','判定APIなし(古いブラウザの可能性)');
    addNgDetail('warn', t.bio + ' 認証器',
      'isUserVerifyingPlatformAuthenticatorAvailable = undefined',
      '認証器の有無を確認するAPIがありません。かなり古いブラウザの可能性があります。',
      ['OSとブラウザを最新版にアップデートしてください']);
  } else {
    setRow('plat','ng','—');
  }

  // Conditional UI
  if(hasAPI && PublicKeyCredential.isConditionalMediationAvailable){
    try{
      const c = await PublicKeyCredential.isConditionalMediationAvailable();
      log('conditionalMediation=' + c);
      setRow('cond', c ? 'ok' : 'warn', c ? '対応' : '非対応(作成自体には影響なし)');
    }catch(e){ setRow('cond','warn','判定不可'); }
  } else {
    setRow('cond','warn','判定APIなし(作成自体には影響なし)');
  }

  // iframe
  const inFrame = window !== window.top;
  log('inIframe=' + inFrame);
  if(inFrame){
    setRow('frame','warn','iframe内で実行中');
    addNgDetail('warn','iframe 制限',
      'window !== window.top(iframe内で実行中)',
      'クロスオリジンのiframe内ではパスキー作成がブロックされます。プレビュー環境や埋め込み表示ではNGになります。',
      [t.browser + 'でこのURLを直接開いてください']);
  } else {
    setRow('frame','ok','トップレベルで実行中');
  }

  // WebView
  if(WEBVIEW){
    setRow('wv','ng', WEBVIEW + ' のアプリ内ブラウザで実行中');
    fatal = true;
    addNgDetail('ng','アプリ内ブラウザ判定',
      'UserAgentに ' + WEBVIEW + ' の痕跡を検出\nUA: ' + navigator.userAgent.slice(0,120),
      'アプリ内ブラウザ(WebView)ではパスキーの認証器にアクセスできないことが多く、作成に失敗します。',
      ['共有メニューまたはメニューボタン(⋮)から「' + t.browser + 'で開く」を選ぶ',
       '見つからない場合はURLをコピーして' + t.browser + 'に貼り付けて開く']);
  } else {
    setRow('wv','ok', t.browser + ' 等の通常ブラウザと判定');
  }

  // OS / browser version
  const ua = navigator.userAgent;
  log('UA=' + ua);
  if(OS.os === 'other'){
    setRow('os','warn', OS.label + ' — ' + ua.slice(0,70));
  } else if(OS.ver === null){
    setRow('os','warn', OS.label + '(バージョン判定不可)');
  } else if(t.minVer && OS.ver < t.minVer){
    setRow('os','ng', OS.label + ' — バージョンが古い');
    fatal = true;
    addNgDetail('ng','ブラウザ / OS',
      '検出バージョン: ' + OS.label + '(要件: ' + (OS.os==='ios'?'iOS 16':'Android 9') + '以上)',
      'OSのバージョンがパスキーの対応要件を満たしていません。',
      ['OSを最新版にアップデートしてください']);
  } else {
    setRow('os','ok', OS.label);
  }

  renderNgDetails();

  if(fatal){
    showVerdict('ng','❌ 環境に問題があります','チェック一覧の下に詳細な原因と対策を表示しています');
  } else {
    showVerdict('warn','⚠️ 環境チェックは通過','下のボタンで実際の作成テストを行ってください');
  }
}

// ---- 作成テスト ----
function randomBytes(n){ const a = new Uint8Array(n); crypto.getRandomValues(a); return a; }

function errGuide(name){
  const g = {
    NotAllowedError: {
      title: '作成が許可されませんでした(NotAllowedError)',
      verdict: 'キャンセル or 端末設定が原因の可能性が高いです',
      steps: t.notAllowed,
    },
    SecurityError: {
      title: 'ドメイン関連のエラー(SecurityError)',
      verdict: 'rpId とドメインの不一致、または非HTTPSが原因です',
      steps: [
        'HTTPSの正式なドメイン(Netlify等)でこのページを開いているか確認',
        'IPアドレス直打ちやlocalhost以外の非HTTPS環境では動作しません',
      ]
    },
    InvalidStateError: {
      title: 'すでに登録済み(InvalidStateError)',
      verdict: 'この端末には同じアカウントのパスキーが既にあります',
      steps: [
        '実際のサイトでこれが出る場合、既存パスキーが存在します',
        t.cleanup,
      ]
    },
    NotSupportedError: {
      title: 'パラメータ非対応(NotSupportedError)',
      verdict: 'ブラウザが要求されたアルゴリズム等に非対応です',
      steps: [
        'OSとブラウザを最新にアップデート',
        '実サイトで出る場合はサイト側のWebAuthn設定の問題の可能性が高い',
      ]
    },
    AbortError: {
      title: '中断されました(AbortError)',
      verdict: 'タイムアウトまたは処理の中断です',
      steps: ['もう一度テストを実行し、すぐに認証まで進めてください']
    },
  };
  return g[name];
}

document.getElementById('runBtn').onclick = async () => {
  const btn = document.getElementById('runBtn');
  btn.disabled = true; btn.textContent = 'テスト中…(' + t.bio + 'に従ってください)';
  hideFix();
  try{
    const cred = await navigator.credentials.create({
      publicKey: {
        challenge: randomBytes(32),
        rp: { name: 'パスキー診断', id: location.hostname },
        user: {
          id: randomBytes(16),
          name: 'diagnostic-test',
          displayName: '診断テスト',
        },
        pubKeyCredParams: [
          { type: 'public-key', alg: -7 },   // ES256
          { type: 'public-key', alg: -257 }, // RS256
        ],
        authenticatorSelection: {
          authenticatorAttachment: 'platform',
          userVerification: 'required',
        },
        timeout: 60000,
        attestation: 'none',
      }
    });
    log('create SUCCESS id=' + cred.id.slice(0,20) + '…');
    showVerdict('ok','✅ パスキー作成に成功しました',
      'この端末・ブラウザ環境は正常です。特定のサイトで失敗する場合は、そのサイト側の実装や既存パスキーの重複が原因の可能性が高いです');
    showFix('テスト用パスキーの後片付け', [ t.cleanup ]);
  }catch(e){
    log('create FAILED: ' + e.name + ' — ' + e.message);
    const g = errGuide(e.name);
    // 作成テストの失敗もNG詳細パネルに追記
    addNgDetail('ng','パスキー作成テスト',
      'navigator.credentials.create() が失敗\n' + e.name + ': ' + e.message,
      g ? g.verdict : '未分類のエラーです。',
      g ? g.steps : ['詳細ログを表示して、エラー内容を確認してください']);
    renderNgDetails();
    if(g){
      showVerdict('ng','❌ ' + g.verdict, 'エラー種別: ' + e.name + '(詳細は下部を参照)');
      showFix(g.title, g.steps);
    } else {
      showVerdict('ng','❌ 作成に失敗しました', e.name + ': ' + e.message);
      showFix('未分類のエラー', ['詳細ログを表示して、エラー内容を確認してください']);
    }
  }finally{
    btn.disabled = false; btn.textContent = 'パスキー作成テストを実行';
  }
};

autoChecks();
</script>
